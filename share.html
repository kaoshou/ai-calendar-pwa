<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>接收分享文字</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#38bdf8">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,'Noto Sans TC',sans-serif; color:#e5f0ff; background:#050816; padding:18px; }
    .box { width:min(560px,100%); padding:24px; border-radius:24px; background:rgba(15,23,42,.8); border:1px solid rgba(255,255,255,.16); line-height:1.8; }
  </style>
</head>
<body>
  <div class="box">正在將分享文字送到 AI 行事曆助理...</div>
<script>
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby7vtIPaK4zSgtX5H1Cpk51fbYniv7ObEdFWwBN-biZVx8qX35Ir7vzwQy1xmIqjddD/exec';
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(console.warn);
const params = new URLSearchParams(location.search);
const title = params.get('title') || params.get('sharedTitle') || '';
const text = params.get('text') || params.get('sharedText') || params.get('body') || '';
const url = params.get('url') || params.get('href') || params.get('sharedUrl') || '';

const target = new URL(GAS_WEB_APP_URL);

// 同時帶多種參數名稱，讓 GAS 端與不同 App 分享格式都能接到。
if (title) {
  target.searchParams.set('title', title);
  target.searchParams.set('sharedTitle', title);
}
if (text) {
  target.searchParams.set('sharedText', text);
  target.searchParams.set('text', text);
  target.searchParams.set('body', text);
  target.searchParams.set('pwaText', text);
}
if (url) {
  target.searchParams.set('url', url);
  target.searchParams.set('sharedUrl', url);
}

document.querySelector('.box').innerHTML =
  '<strong>已接收分享內容，正在開啟 AI 行事曆助理...</strong><br>' +
  '<small>文字長度：' + text.length + ' 字</small>';

setTimeout(() => location.replace(target.toString()), 180);
</script>
</body>
</html>
