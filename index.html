<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 行事曆助理</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#38bdf8">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,'Noto Sans TC',sans-serif; color:#e5f0ff; background:radial-gradient(circle at 20% 10%,rgba(56,189,248,.28),transparent 24rem),linear-gradient(135deg,#020617,#0f172a); }
    main { width:min(560px, calc(100% - 32px)); padding:28px; border:1px solid rgba(255,255,255,.16); border-radius:28px; background:rgba(15,23,42,.72); box-shadow:0 24px 70px rgba(0,0,0,.35); }
    h1 { margin:0 0 12px; font-size:2rem; }
    p { color:#9fb0ca; line-height:1.8; }
    a { display:inline-flex; margin-top:14px; padding:13px 18px; border-radius:14px; background:linear-gradient(135deg,#38bdf8,#818cf8); color:#03111f; font-weight:900; text-decoration:none; }
    code { background:rgba(255,255,255,.08); padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <main>
    <h1>AI 行事曆助理</h1>
    <p>這是 PWA 外殼頁。請先把 <code>index.html</code> 裡的 <code>GAS_WEB_APP_URL</code> 改成你的 Apps Script Web App URL。</p>
    <a id="openApp" href="#">開啟 AI 行事曆助理</a>
  </main>
<script>
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby7vtIPaK4zSgtX5H1Cpk51fbYniv7ObEdFWwBN-biZVx8qX35Ir7vzwQy1xmIqjddD/exec'; //YOUR_APPS_SCRIPT_WEB_APP_URL_HERE
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
document.getElementById('openApp').addEventListener('click', (e) => {
  e.preventDefault();
  if (GAS_WEB_APP_URL.includes('YOUR_APPS_SCRIPT')) alert('請先設定 GAS_WEB_APP_URL');
  else location.href = GAS_WEB_APP_URL;
});
</script>
</body>
</html>
